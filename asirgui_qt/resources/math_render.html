<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Asir Math View</title>
  <link rel="stylesheet" href="qrc:/katex/katex.min.css">
  <script src="qrc:/katex/katex.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      font-family: "Noto Sans JP", sans-serif;
      background: #f7f4ee;
      color: #1f2933;
    }

    body {
      margin: 0;
      padding: 12px;
      background:
        radial-gradient(circle at top right, rgba(214, 165, 96, 0.18), transparent 24%),
        linear-gradient(180deg, #fcfaf6 0%, #f3ede2 100%);
    }

    #output {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .math-block {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(124, 95, 64, 0.22);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(61, 43, 20, 0.08);
      padding: 12px 14px;
      overflow-x: auto;
    }

    .math-block .label {
      color: #7c5f40;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Iosevka Term", "Noto Sans Mono", monospace;
    }

    .math-fallback {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Iosevka Term", "Noto Sans Mono", monospace;
      font-size: 16px;
      line-height: 1.55;
    }

    .math-rendered {
      font-size: 1.05rem;
    }

    .math-warning {
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-family: "Iosevka Term", "Noto Sans Mono", monospace;
      line-height: 1.55;
    }

    .math-warning .message {
      font-size: 15px;
      white-space: pre-wrap;
    }

    .math-warning .details {
      font-size: 13px;
      color: #6b7280;
      white-space: pre-wrap;
    }

    .math-warning .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .math-warning .force-link {
      display: inline-block;
      text-decoration: none;
      color: #fffaf0;
      background: #8a5a2b;
      border: 1px solid #71461c;
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="output"></div>
  <script>
    function renderLatexBlock(block, latex) {
      var container = block.querySelector(".render-target");
      container.innerHTML = "";

      if (window.katex) {
        try {
          container.className = "render-target math-rendered";
          window.katex.render(latex, container, {
            displayMode: true,
            throwOnError: false,
            strict: "ignore"
          });
          return;
        } catch (error) {
        }
      }

      container.className = "render-target math-fallback";
      container.textContent = latex;
    }

    function appendLatexFromJson(args) {
      var title = args[0];
      var latex = args[1];

      var block = document.createElement("section");
      block.className = "math-block";

      var label = document.createElement("div");
      label.className = "label";
      label.textContent = title;
      block.appendChild(label);

      var container = document.createElement("div");
      container.className = "render-target";
      block.appendChild(container);
      document.getElementById("output").appendChild(block);

      renderLatexBlock(block, latex);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function appendPlainTextFromJson(args) {
      var title = args[0];
      var text = args[1];

      var block = document.createElement("section");
      block.className = "math-block";

      var label = document.createElement("div");
      label.className = "label";
      label.textContent = title;
      block.appendChild(label);

      var container = document.createElement("div");
      container.className = "render-target math-fallback";
      container.textContent = text;
      block.appendChild(container);

      document.getElementById("output").appendChild(block);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function appendRenderSkippedFromJson(args) {
      var title = args[0];
      var message = args[1];
      var details = args[2];
      var token = args[3];
      var allowForce = args[4];

      var block = document.createElement("section");
      block.className = "math-block";

      var label = document.createElement("div");
      label.className = "label";
      label.textContent = title;
      block.appendChild(label);

      var wrapper = document.createElement("div");
      wrapper.className = "math-warning";

      var messageNode = document.createElement("div");
      messageNode.className = "message";
      messageNode.textContent = message;
      wrapper.appendChild(messageNode);

      if (details) {
        var detailsNode = document.createElement("div");
        detailsNode.className = "details";
        detailsNode.textContent = details;
        wrapper.appendChild(detailsNode);
      }

      if (allowForce && token) {
        var actions = document.createElement("div");
        actions.className = "actions";

        var link = document.createElement("a");
        link.className = "force-link";
        link.href = "asirgui://force-render?token=" + encodeURIComponent(token);
        link.textContent = "強制レンダリング";
        actions.appendChild(link);
        wrapper.appendChild(actions);
      }

      block.appendChild(wrapper);
      document.getElementById("output").appendChild(block);
      window.scrollTo(0, document.body.scrollHeight);
    }

    function clearOutput() {
      document.getElementById("output").innerHTML = "";
    }
  </script>
</body>
</html>
